# infrastructure/k8s/base/services.yaml
apiVersion: v1
kind: Service
metadata:
  name: chat-ui
spec:
  selector:
    app: chat-ui
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-api
spec:
  selector:
    app: langgraph-api
  ports:
    - port: 2024
      targetPort: 2024
---
apiVersion: v1
kind: Service
metadata:
  name: persistence-api
spec:
  selector:
    app: persistence-api
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: duckling
spec:
  selector:
    app: duckling
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
