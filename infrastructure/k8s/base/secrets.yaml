  OPENROUTER_API_KEY: Y2hhbmdlbWU=
  LANGSMITH_API_KEY: Y2hhbmdlbWU=
  TAVILY_API_KEY: Y2hhbmdlbWU=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
