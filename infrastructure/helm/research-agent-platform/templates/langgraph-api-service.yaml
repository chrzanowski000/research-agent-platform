apiVersion: v1
kind: Service
metadata:
  name: langgraph-api
  labels:
    {{- include "research-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: langgraph-api
spec:
  type: ClusterIP
  selector:
    {{- include "research-agent-platform.selectorLabels" (dict "component" "langgraph-api" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 2024
      targetPort: 2024
      protocol: TCP
