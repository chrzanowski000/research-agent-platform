apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "research-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    {{- include "research-agent-platform.selectorLabels" (dict "component" "postgres" "root" .) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
