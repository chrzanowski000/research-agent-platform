{{- if .Values.langgraphApi.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langgraph-data
  labels:
    {{- include "research-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: langgraph-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.langgraphApi.persistence.size }}
  {{- if .Values.langgraphApi.persistence.storageClass }}
  storageClassName: {{ .Values.langgraphApi.persistence.storageClass }}
  {{- end }}
{{- end }}
