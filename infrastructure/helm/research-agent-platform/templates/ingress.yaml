{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-ingress
  labels:
    {{- include "research-agent-platform.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api(/|$)(research.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: persistence-api
                port:
                  number: 8001
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: langgraph-api
                port:
                  number: 2024
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: chat-ui
                port:
                  number: 3000
{{- end }}
