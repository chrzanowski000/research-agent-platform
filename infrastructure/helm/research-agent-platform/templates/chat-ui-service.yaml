apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  labels:
    {{- include "research-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat-ui
spec:
  type: ClusterIP
  selector:
    {{- include "research-agent-platform.selectorLabels" (dict "component" "chat-ui" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
