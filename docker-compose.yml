services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: research
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: services/langgraph-api
      dockerfile: ../../infrastructure/docker/langgraph-api.Dockerfile
    ports:
      - "2024:2024"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      MODEL_NAME: ${MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b:free}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-self-reflection-agent}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      DUCKLING_URL: ${DUCKLING_URL:-http://duckling:8000}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/research
      PERSIST_RUNS: ${PERSIST_RUNS:-false}
      USE_MOCK_S2: ${USE_MOCK_S2:-false}
      # Startup diagnostics
      LOG_MODELS: ${LOG_MODELS:-false}
      # Per-agent/node model overrides
      RESEARCH_MODEL: ${RESEARCH_MODEL:-}
      RESEARCH_PLANNER_MODEL: ${RESEARCH_PLANNER_MODEL:-}
      RESEARCH_SYNTHESIZER_MODEL: ${RESEARCH_SYNTHESIZER_MODEL:-}
      REFLECTION_V1_MODEL: ${REFLECTION_V1_MODEL:-}
      REFLECTION_V1_SEARCH_DECISION_MODEL: ${REFLECTION_V1_SEARCH_DECISION_MODEL:-}
      REFLECTION_V1_GENERATE_MODEL: ${REFLECTION_V1_GENERATE_MODEL:-}
      REFLECTION_V1_REFLECT_MODEL: ${REFLECTION_V1_REFLECT_MODEL:-}
      REFLECTION_V2_MODEL: ${REFLECTION_V2_MODEL:-}
      REFLECTION_V2_GENERATE_MODEL: ${REFLECTION_V2_GENERATE_MODEL:-}
      REFLECTION_V2_REFLECT_MODEL: ${REFLECTION_V2_REFLECT_MODEL:-}
    volumes:
      - ./data:/app/data
    depends_on:
      duckling:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2024/ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  ui:
    build:
      context: services/chat-ui
      dockerfile: ../../infrastructure/docker/chat-ui.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:2024
      NEXT_PUBLIC_ASSISTANT_ID: self_reflection_agent
      LANGGRAPH_API_URL: http://agent:2024
      RESEARCH_PERSISTENCE_API_URL: http://research-persistence-api:8001
    depends_on:
      agent:
        condition: service_healthy

  duckling:
    image: rasa/duckling
    ports:
      - "8000:8000"

  research-persistence-api:
    build:
      context: services/persistence-api
      dockerfile: ../../infrastructure/docker/persistence-api.Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/research
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
